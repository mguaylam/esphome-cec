name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install "ruff==0.9.10" "clang-format==20.1.0"
      - name: ruff format
        run: ruff format --check .
      - name: ruff check
        run: ruff check .
      - name: clang-format
        run: find components \( -name '*.h' -o -name '*.cpp' \) -print0 | xargs -0 clang-format --dry-run --Werror

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.espressif
          key: platformio-${{ runner.os }}
      - name: Install ESPHome
        # Intentionally unpinned: the build must track the current ESPHome
        # release so a breaking API change surfaces here, not on users' devices.
        run: pip install esphome
      - name: Compile the test configuration
        run: esphome compile tests/test-esp32-s3-idf.yaml
