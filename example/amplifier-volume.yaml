# Example: read and control an HDMI-CEC amplifier's volume, with no C++.
#
# Wiring: HDMI pin 13 (CEC) → GPIO4, HDMI pin 17 (ground) → GND.
#
# The amplifier is an audio system (logical address 5). This component declares
# itself a "playback" device and negotiates a free logical address at startup.
# Read the "note on real devices" section of the README before wiring this to
# your own amplifier.

esphome:
  name: cec-example

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      # Required: the receiver ACK starts and stops a gptimer from ISR context.
      CONFIG_GPTIMER_CTRL_FUNC_IN_IRAM: "y"

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: git
      url: https://github.com/mguaylam/esphome-cec
    components: [hdmi_cec]

hdmi_cec:
  id: cec_bus
  pin: GPIO4
  device_type: playback
  devices:
    tv: 0x0
    avr: 0x5

# The device-state registry tracks the amplifier passively (and polls it), so
# these entities need no lambdas.
sensor:
  - platform: hdmi_cec
    name: "Amplifier volume"
    device: avr
    type: audio_volume

binary_sensor:
  - platform: hdmi_cec
    name: "Amplifier on"
    device: avr
    type: power
  - platform: hdmi_cec
    name: "Amplifier muted"
    device: avr
    type: mute

button:
  - platform: template
    name: "Volume up"
    on_press:
      - hdmi_cec.volume: { device: avr, action: up }
  - platform: template
    name: "Volume down"
    on_press:
      - hdmi_cec.volume: { device: avr, action: down }
  - platform: template
    name: "Mute"
    on_press:
      - hdmi_cec.volume: { device: avr, action: mute }
  - platform: template
    name: "Amplifier standby"
    on_press:
      - hdmi_cec.standby: { device: avr }
